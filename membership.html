<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Options</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .card { border: 1px solid #ccc; border-radius: 5px; padding: 20px; margin: 20px; text-align: center; }
        .button { background-color: #4CAF50; color: white; padding: 15px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background-color: #45a049; }
        .grid { display: flex; justify-content: space-around; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Membership Options</h1>
        <div class="grid">
            <div class="card">
                <h2>Free Membership</h2>
                <p>$0</p>
                <ul>
                    <li>1 genealogy session every 6 months</li>
                </ul>
                <button class="button">Join Free</button>
            </div>
            <div class="card">
                <h2>Premium Membership</h2>
                <p>$50/year</p>
                <ul>
                    <li>5 free personal genealogy sessions</li>
                </ul>
                <button class="button">Join Premium</button>
            </div>
            <div class="card">
                <h2>Book a Session</h2>
                <p>$20 per session</p>
                <button class="button">Book Now</button>
            </div>
        </div>
    </div>
</body>
</html>
